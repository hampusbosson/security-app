services:
  postgres:
    image: postgres:16
    container_name: security-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-security_app}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-security_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: security-app-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--stop-writes-on-bgsave-error", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ngrok:
    image: ngrok/ngrok:latest
    container_name: security-app-ngrok
    restart: unless-stopped
    profiles: ["ngrok"]
    depends_on:
      - postgres
      - redis
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "http://host.docker.internal:${BACKEND_PORT:-4000}"
      - "--log=stdout"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NGROK_WEB_PORT:-4040}:4040"

volumes:
  postgres_data:
